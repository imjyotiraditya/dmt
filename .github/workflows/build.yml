name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v7

      - name: set up jdk
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: set up gradle
        uses: gradle/actions/setup-gradle@v6

      - name: lint
        run: ./gradlew :app:lintRelease

      - name: run unit tests
        run: ./gradlew testDebugUnitTest

      - name: decode keystore
        if: github.event_name != 'pull_request'
        run: echo "${{ secrets.SIGNING_KEYSTORE }}" | base64 -d > dmt.keystore

      - name: resolve version
        id: version
        run: echo "name=unreleased-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: build
        env:
          SIGNING_KEYSTORE_PATH: dmt.keystore
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew assembleDebug assembleRelease -PversionOverride=${{ steps.version.outputs.name }}

      - name: upload debug apk
        uses: actions/upload-artifact@v7
        with:
          name: dmt-debug
          path: app/build/outputs/apk/debug/*.apk
          archive: false

      - name: upload release apk
        uses: actions/upload-artifact@v7
        with:
          name: dmt-release
          path: app/build/outputs/apk/release/*.apk
          archive: false
