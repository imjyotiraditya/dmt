version: 2
updates:
  - package-ecosystem: gradle
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "-- build"
      include: scope
    groups:
      gradle:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "-- ci"
      include: scope
    groups:
      actions:
        patterns:
          - "*"
